            <div id="map" class="leaflet-container leaflet-touch leaflet-retina leaflet-fade-anim leaflet-grab leaflet-touch-drag leaflet-touch-zoom" tabindex="0" style="position: relative;"><div class="leaflet-pane leaflet-map-pane" style="transform: translate3d(0px, 1px, 0px);"><div class="leaflet-pane leaflet-tile-pane"><div class="leaflet-layer " style="z-index: 1; opacity: 1;"><div class="leaflet-tile-container leaflet-zoom-animated" style="z-index: 19; transform: translate3d(0px, 0px, 0px) scale(1);"><img alt="" src="https://b.tile.openstreetmap.org/7/106/54.png" class="leaflet-tile leaflet-tile-loaded" style="width: 256px; height: 256px; transform: translate3d(173px, -197px, 0px); opacity: 1;"><img alt="" src="https://c.tile.openstreetmap.org/7/107/54.png" class="leaflet-tile leaflet-tile-loaded" style="width: 256px; height: 256px; transform: translate3d(429px, -197px, 0px); opacity: 1;"><img alt="" src="https://c.tile.openstreetmap.org/7/106/55.png" class="leaflet-tile leaflet-tile-loaded" style="width: 256px; height: 256px; transform: translate3d(173px, 59px, 0px); opacity: 1;"><img alt="" src="https://a.tile.openstreetmap.org/7/107/55.png" class="leaflet-tile leaflet-tile-loaded" style="width: 256px; height: 256px; transform: translate3d(429px, 59px, 0px); opacity: 1;"><img alt="" src="https://a.tile.openstreetmap.org/7/105/54.png" class="leaflet-tile leaflet-tile-loaded" style="width: 256px; height: 256px; transform: translate3d(-83px, -197px, 0px); opacity: 1;"><img alt="" src="https://a.tile.openstreetmap.org/7/108/54.png" class="leaflet-tile leaflet-tile-loaded" style="width: 256px; height: 256px; transform: translate3d(685px, -197px, 0px); opacity: 1;"><img alt="" src="https://b.tile.openstreetmap.org/7/105/55.png" class="leaflet-tile leaflet-tile-loaded" style="width: 256px; height: 256px; transform: translate3d(-83px, 59px, 0px); opacity: 1;"><img alt="" src="https://b.tile.openstreetmap.org/7/108/55.png" class="leaflet-tile leaflet-tile-loaded" style="width: 256px; height: 256px; transform: translate3d(685px, 59px, 0px); opacity: 1;"></div></div></div><div class="leaflet-pane leaflet-overlay-pane"></div><div class="leaflet-pane leaflet-shadow-pane"></div><div class="leaflet-pane leaflet-marker-pane"></div><div class="leaflet-pane leaflet-tooltip-pane"></div><div class="leaflet-pane leaflet-popup-pane"></div><div class="leaflet-proxy leaflet-zoom-animated" style="transform: translate3d(27394px, 14162.5px, 0px) scale(64);"></div></div><div class="leaflet-control-container"><div class="leaflet-top leaflet-left"><div class="leaflet-control-zoom leaflet-bar leaflet-control"><a class="leaflet-control-zoom-in" href="blob:https://5kprau3wtup734vdqsclq2z5yiajpjw1eapfw6p5m6xnba455s-h845251650.scf.usercontent.goog/89ba4399-1944-4ca6-869c-af1745bcc4b2#" title="Zoom in" role="button" aria-label="Zoom in" aria-disabled="false"><span aria-hidden="true">+</span></a><a class="leaflet-control-zoom-out" href="blob:https://5kprau3wtup734vdqsclq2z5yiajpjw1eapfw6p5m6xnba455s-h845251650.scf.usercontent.goog/89ba4399-1944-4ca6-869c-af1745bcc4b2#" title="Zoom out" role="button" aria-label="Zoom out" aria-disabled="false"><span aria-hidden="true">−</span></a></div></div><div class="leaflet-top leaflet-right"></div><div class="leaflet-bottom leaflet-left"></div><div class="leaflet-bottom leaflet-right"><div class="leaflet-control-attribution leaflet-control"><a href="https://leafletjs.com/" title="A JavaScript library for interactive maps"><svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="12" height="8" viewBox="0 0 12 8" class="leaflet-attribution-flag"><path fill="#4C7BE1" d="M0 0h12v4H0z"></path><path fill="#FFD500" d="M0 4h12v3H0z"></path><path fill="#E0BC00" d="M0 7h12v1H0z"></path></svg> Leaflet</a> <span aria-hidden="true">|</span> © <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors</div></div></div></div>
            <!-- Overlay Button to re-center -->
            <button onclick="centerMap()" class="absolute bottom-4 right-4 z-[400] bg-white p-3 rounded-full shadow-lg hover:bg-gray-100 active:scale-95 transition text-blue-600" title="回到目前位置">
                <i class="fa-solid fa-location-crosshairs text-xl"></i>
            </button>
        </div>

        <!-- Dashboard Grid -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <!-- Latitude -->
            <div class="stat-card bg-white p-3 rounded-lg shadow-sm border-l-4 border-blue-500">
                <div class="text-xs text-slate-500 uppercase font-semibold">緯度 (Latitude)</div>
                <div id="val-lat" class="text-lg font-mono font-bold text-slate-700">--</div>
            </div>
            <!-- Longitude -->
            <div class="stat-card bg-white p-3 rounded-lg shadow-sm border-l-4 border-blue-500">
                <div class="text-xs text-slate-500 uppercase font-semibold">經度 (Longitude)</div>
                <div id="val-lng" class="text-lg font-mono font-bold text-slate-700">--</div>
            </div>
            <!-- Accuracy -->
            <div class="stat-card bg-white p-3 rounded-lg shadow-sm border-l-4 border-green-500">
                <div class="text-xs text-slate-500 uppercase font-semibold">精確度 (Accuracy)</div>
                <div class="text-lg font-mono font-bold text-slate-700"><span id="val-acc">--</span> <span class="text-xs text-slate-400">m</span></div>
            </div>
            <!-- Altitude -->
            <div class="stat-card bg-white p-3 rounded-lg shadow-sm border-l-4 border-purple-500">
                <div class="text-xs text-slate-500 uppercase font-semibold">海拔 (Altitude)</div>
                <div class="text-lg font-mono font-bold text-slate-700"><span id="val-alt">--</span> <span class="text-xs text-slate-400">m</span></div>
            </div>
            <!-- Speed -->
            <div class="stat-card bg-white p-3 rounded-lg shadow-sm border-l-4 border-orange-500">
                <div class="text-xs text-slate-500 uppercase font-semibold">速度 (Speed)</div>
                <div class="text-lg font-mono font-bold text-slate-700"><span id="val-spd">0</span> <span class="text-xs text-slate-400">km/h</span></div>
            </div>
            <!-- Heading -->
            <div class="stat-card bg-white p-3 rounded-lg shadow-sm border-l-4 border-yellow-500">
                <div class="text-xs text-slate-500 uppercase font-semibold">方位 (Heading)</div>
                <div class="flex items-center gap-2">
                    <span id="val-head" class="text-lg font-mono font-bold text-slate-700">--°</span>
                    <i id="icon-direction" class="fa-solid fa-arrow-up text-slate-300 transition-transform duration-500"></i>
                </div>
            </div>
             <!-- Timestamp -->
             <div class="stat-card bg-white p-3 rounded-lg shadow-sm border-l-4 border-gray-500 col-span-2 md:col-span-2">
                <div class="text-xs text-slate-500 uppercase font-semibold">更新時間 (Time)</div>
                <div id="val-time" class="text-sm font-mono font-bold text-slate-700 pt-1">--</div>
            </div>
        </div>

        <!-- Controls -->
        <div class="bg-white p-4 rounded-xl shadow-lg border border-slate-200">
            <div class="flex flex-col md:flex-row gap-3">
                <button id="btn-start" onclick="toggleTracking()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition flex items-center justify-center gap-2 shadow-blue-200 shadow-lg">
                    <i class="fa-solid fa-play"></i>
                    <span>開始定位追蹤</span>
                </button>
                
                <button onclick="copyCoordinates()" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-3 px-6 rounded-lg transition flex items-center justify-center gap-2 border border-slate-300">
                    <i class="fa-regular fa-copy"></i>
                    <span>複製座標</span>
                </button>
            </div>
            
            <!-- Message Log -->
            <div id="message-log" class="mt-4 p-3 bg-slate-50 rounded text-sm text-slate-500 font-mono h-24 overflow-y-auto border border-slate-200"><div>[19:59:45] 地圖載入完成。</div>
                <div>系統就緒。請點擊「開始定位追蹤」以獲取位置。</div>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="bg-white p-4 text-center text-slate-400 text-xs mt-auto border-t">
        <p>注意：GPS 定位需要 HTTPS 連線與裝置權限許可。</p>
    </footer>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="anonymous"></script>

    <script>
        // Global Variables
        let map;
        let userMarker;
        let accuracyCircle;
        let watchId = null;
        let isTracking = false;
        let lastPosition = null;

        // Icons
        const locationIcon = L.divIcon({
            className: 'custom-div-icon',
            html: "<div style='background-color:#2563eb; width: 16px; height: 16px; border-radius: 50%; border: 3px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.5);'></div>",
            iconSize: [16, 16],
            iconAnchor: [8, 8]
        });

        // Initialize Map
        function initMap() {
            // Default view (Taiwan center roughly, high zoom out)
            map = L.map('map').setView([23.6978, 120.9605], 7);

            // Add OpenStreetMap tile layer
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
                maxZoom: 19
            }).addTo(map);

            logMessage("地圖載入完成。");
        }

        // Toggle Tracking Logic
        function toggleTracking() {
            const btn = document.getElementById('btn-start');
            const statusBadge = document.getElementById('status-badge');

            if (isTracking) {
                // Stop Tracking
                if (watchId !== null) {
                    navigator.geolocation.clearWatch(watchId);
                    watchId = null;
                }
                isTracking = false;
                
                // UI Updates
                btn.innerHTML = '<i class="fa-solid fa-play"></i> <span>開始定位追蹤</span>';
                btn.classList.replace('bg-red-500', 'bg-blue-600');
                btn.classList.replace('hover:bg-red-600', 'hover:bg-blue-700');
                btn.classList.remove('recording-dot');
                
                statusBadge.textContent = "已暫停";
                statusBadge.className = "bg-gray-500 text-white text-xs px-3 py-1 rounded-full";
                logMessage("追蹤已停止。");
            } else {
                // Start Tracking
                if (!navigator.geolocation) {
                    alert("您的瀏覽器不支援 Geolocation API");
                    logMessage("錯誤：不支援 Geolocation API");
                    return;
                }

                // UI Updates
                btn.innerHTML = '<i class="fa-solid fa-stop"></i> <span>停止定位追蹤</span>';
                btn.classList.replace('bg-blue-600', 'bg-red-500');
                btn.classList.replace('hover:bg-blue-700', 'hover:bg-red-600');
                
                statusBadge.textContent = "搜尋衛星中...";
                statusBadge.className = "bg-yellow-500 text-white text-xs px-3 py-1 rounded-full recording-dot";
                logMessage("正在請求位置權限...");

                // Start Watch
                const options = {
                    enableHighAccuracy: true, // Request best possible results (GPS)
                    timeout: 10000,          // Wait 10s before timing out
                    maximumAge: 0            // Don't use cached positions
                };

                watchId = navigator.geolocation.watchPosition(updatePosition, handleError, options);
                isTracking = true;
            }
        }

        // Success Callback
        function updatePosition(position) {
            const { latitude, longitude, accuracy, altitude, speed, heading } = position.coords;
            const timestamp = new Date(position.timestamp).toLocaleTimeString('zh-TW');

            lastPosition = position;

            // Update DOM Elements
            document.getElementById('val-lat').innerText = latitude.toFixed(6);
            document.getElementById('val-lng').innerText = longitude.toFixed(6);
            document.getElementById('val-acc').innerText = Math.round(accuracy);
            document.getElementById('val-alt').innerText = altitude ? Math.round(altitude) : 'N/A';
            document.getElementById('val-spd').innerText = speed ? (speed * 3.6).toFixed(1) : '0.0'; // Convert m/s to km/h
            document.getElementById('val-time').innerText = timestamp;
            
            // Heading logic
            const headElem = document.getElementById('val-head');
            const iconDir = document.getElementById('icon-direction');
            if (heading) {
                headElem.innerText = Math.round(heading) + '°';
                iconDir.style.transform = `rotate(${heading}deg)`;
                iconDir.classList.remove('text-slate-300');
                iconDir.classList.add('text-blue-600');
            } else {
                headElem.innerText = '--°';
            }

            // Update Status Badge
            const statusBadge = document.getElementById('status-badge');
            statusBadge.textContent = "定位中 (Live)";
            statusBadge.className = "bg-green-600 text-white text-xs px-3 py-1 rounded-full recording-dot";

            // Update Map
            updateMapMarker(latitude, longitude, accuracy);

            logMessage(`位置更新: ${latitude.toFixed(4)}, ${longitude.toFixed(4)} (精度: ${Math.round(accuracy)}m)`);
        }

        // Error Callback
        function handleError(error) {
            let msg = "";
            let showAlert = false;

            switch(error.code) {
                case error.PERMISSION_DENIED:
                    msg = "權限被拒絕。請點擊網址列左側的「鎖頭」或「Aa」圖示，並允許存取「位置」權限，然後重新整理網頁。";
                    showAlert = true;
                    break;
                case error.POSITION_UNAVAILABLE:
                    msg = "無法偵測目前位置 (訊號微弱或硬體問題)。請移動到室外空曠處重試。";
                    break;
                case error.TIMEOUT:
                    msg = "請求位置逾時。請檢查網路或 GPS 訊號狀況後重試。";
                    break;
                case error.UNKNOWN_ERROR:
                    msg = "發生未知錯誤。";
                    break;
            }
            logMessage("錯誤: " + msg);
            
            // Reset UI if error occurs during start
            const statusBadge = document.getElementById('status-badge');
            statusBadge.textContent = "定位失敗";
            statusBadge.className = "bg-red-600 text-white text-xs px-3 py-1 rounded-full";

            // Reset button state
            const btn = document.getElementById('btn-start');
            btn.innerHTML = '<i class="fa-solid fa-play"></i> <span>開始定位追蹤</span>';
            btn.classList.replace('bg-red-500', 'bg-blue-600');
            btn.classList.replace('hover:bg-red-600', 'hover:bg-blue-700');
            btn.classList.remove('recording-dot');
            isTracking = false;
            if(watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }

            // Show explicit alert for permission issues
            if (showAlert) {
                alert("⚠️ " + msg);
            }
        }

        // Map Update Logic
        function updateMapMarker(lat, lng, accuracy) {
            if (!map) return;

            // Update Marker
            if (userMarker) {
                userMarker.setLatLng([lat, lng]);
            } else {
                userMarker = L.marker([lat, lng], {icon: locationIcon}).addTo(map);
            }

            // Update Accuracy Circle
            if (accuracyCircle) {
                accuracyCircle.setLatLng([lat, lng]);
                accuracyCircle.setRadius(accuracy);
            } else {
                accuracyCircle = L.circle([lat, lng], {
                    color: '#3b82f6',
                    fillColor: '#3b82f6',
                    fillOpacity: 0.15,
                    radius: accuracy
                }).addTo(map);
            }

            // Auto center map on first locate or if far away? 
            // For this app, let's auto center always for "Tracking" feel.
            map.flyTo([lat, lng], 16, {
                animate: true,
                duration: 1
            });
        }

        // Manual Re-center
        function centerMap() {
            if (lastPosition) {
                map.flyTo([lastPosition.coords.latitude, lastPosition.coords.longitude], 18);
            } else {
                logMessage("尚未取得位置，無法置中。");
            }
        }

        // Copy to Clipboard
        function copyCoordinates() {
            if (!lastPosition) {
                logMessage("尚未取得位置，無法複製。");
                return;
            }
            const text = `${lastPosition.coords.latitude}, ${lastPosition.coords.longitude}`;
            
            // Clipboard API might be restricted in some iframes, fallback included
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    logMessage(`已複製座標: ${text}`);
                    alert("座標已複製到剪貼簿！");
                }).catch(err => {
                    fallbackCopy(text);
                });
            } else {
                fallbackCopy(text);
            }
        }
        
        function fallbackCopy(text) {
             // Create temporary element
             const textArea = document.createElement("textarea");
             textArea.value = text;
             document.body.appendChild(textArea);
             textArea.select();
             try {
                 document.execCommand('copy');
                 logMessage(`已複製座標: ${text}`);
                 alert("座標已複製到剪貼簿！");
             } catch (err) {
                 logMessage("複製失敗，請手動複製。");
             }
             document.body.removeChild(textArea);
        }

        // Logger Utility
        function logMessage(msg) {
            const log = document.getElementById('message-log');
            const entry = document.createElement('div');
            const time = new Date().toLocaleTimeString('zh-TW', {hour12: false});
            entry.innerText = `[${time}] ${msg}`;
            log.prepend(entry); // Newest at top
            
            // Limit log size
            if (log.children.length > 50) {
                log.removeChild(log.lastChild);
            }
        }

        // Initialize App
        window.onload = initMap;

    </script>

</body></html>
